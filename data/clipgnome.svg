  <!-- Clipboard body -->
  <rect x="16" y="14" width="32" height="38" rx="4" fill="#313244"/>
  <!-- Clipboard clip at top -->
  <rect x="26" y="10" width="12" height="8" rx="3" fill="#89b4fa"/>
